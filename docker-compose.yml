services:
  # =========================================================================
  # Database
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: catalyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catalyst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-catalyst_db}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - catalyst-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalyst}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: catalyst-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Backend
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: catalyst-backend/Dockerfile
    container_name: catalyst-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-catalyst}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-catalyst_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      BACKEND_EXTERNAL_ADDRESS: ${BACKEND_EXTERNAL_ADDRESS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-localhost}
      SFTP_ENABLED: ${SFTP_ENABLED:-true}
      SFTP_PORT: "2022"
      SERVER_DATA_DIR: /var/lib/catalyst/servers
      BACKUP_DIR: /var/lib/catalyst/backups
      BACKUP_STORAGE_MODE: ${BACKUP_STORAGE_MODE:-local}
      BACKUP_STREAM_DIR: /tmp/catalyst-backup-stream
      BACKUP_TRANSFER_DIR: /tmp/catalyst-backup-transfer
      # Pass-through — any extra env vars from the host .env
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-127.0.0.1:3000}:3000"
      - "${SFTP_PORT:-127.0.0.1:2022}:2022"
    volumes:
      - catalyst-server-data:/var/lib/catalyst/servers
      - catalyst-backup-data:/var/lib/catalyst/backups
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =========================================================================
  # Frontend (Nginx)
  # =========================================================================
  frontend:
    build:
      context: .
      dockerfile: catalyst-frontend/Dockerfile
    container_name: catalyst-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  catalyst-postgres-data:
    driver: local
  catalyst-server-data:
    driver: local
  catalyst-backup-data:
    driver: local
