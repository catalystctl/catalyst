version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: catalyst-postgres
    environment:
      POSTGRES_USER: catalyst
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalyst_dev}
      POSTGRES_DB: catalyst_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - catalyst-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: catalyst-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  catalyst-postgres-data:
    driver: local
