name: CI/CD - Catalyst Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    container:
      image: oven/bun:1.3-debian
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: catalyst
          POSTGRES_PASSWORD: catalyst_dev_password
          POSTGRES_DB: catalyst_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://catalyst:catalyst_dev_password@postgres:5432/catalyst_db

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        working-directory: catalyst-backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: catalyst-backend
        run: bunx prisma generate

      - name: Security audit
        working-directory: catalyst-backend
        run: bun pm scan || true

      - name: Lint
        working-directory: catalyst-backend
        run: bun run lint

      - name: Build
        working-directory: catalyst-backend
        run: bun run build

  security:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks scan
        run: gitleaks detect --redact -v --log-opts=-1
        continue-on-error: false

  build:
    needs: test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    container:
      image: oven/bun:1.3-debian
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./catalyst-backend
          tags: catalyst:latest
