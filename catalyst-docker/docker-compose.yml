# =============================================================================
# Catalyst — Docker Compose (standalone, pre-built images)
#
# Quick start:
#   1. cp .env.example .env
#   2. Edit .env — set POSTGRES_PASSWORD and BETTER_AUTH_SECRET
#   3. docker compose up -d
#   4. Visit http://<your-host> and register the first admin user
#
# The first registered user automatically becomes the administrator.
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: catalyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalyst
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: catalyst_db
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - catalyst-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: catalyst-redis
    restart: unless-stopped
    command: redis-server
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    healthcheck:
      test: "redis-cli ping | grep PONG"
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Backend
  # ===========================================================================
  backend:
    image: ghcr.io/catalystctl/catalyst-backend:latest
    container_name: catalyst-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      TZ: ${TZ:-UTC}
      LOG_LEVEL: info
      PORT: 3000

      # Database
      DATABASE_URL: postgresql://catalyst:${POSTGRES_PASSWORD}@postgres:5432/catalyst_db

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # Auth / Security
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${PUBLIC_URL:-http://localhost}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-localhost}

      # CORS — set to the URL(s) the panel is accessed from
      CORS_ORIGIN: ${PUBLIC_URL:-http://localhost}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost}

      # Public address used in deploy scripts, agent config, and email links
      BACKEND_EXTERNAL_ADDRESS: ${PUBLIC_URL:-http://localhost}

      # Internal URL override — used by deploy token endpoint for curl one-liner.
      # Must match PUBLIC_URL so the deploy script is reachable from remote nodes.
      BACKEND_URL: ${PUBLIC_URL:-http://localhost}

      # SFTP
      SFTP_ENABLED: ${SFTP_ENABLED:-true}
      SFTP_PORT: "2022"
      SFTP_MAX_FILE_SIZE: ${SFTP_MAX_FILE_SIZE:-104857600}
      SFTP_HOST_KEY: ${SFTP_HOST_KEY:-}
      SFTP_HOST_KEY_BASE64: ${SFTP_HOST_KEY_BASE64:-}

      # Deploy script (baked into the image)
      DEPLOY_SCRIPT_PATH: /scripts/deploy-agent.sh

      # Data directories
      SERVER_DATA_DIR: /var/lib/catalyst/servers
      BACKUP_DIR: /var/lib/catalyst/backups
      BACKUP_STORAGE_MODE: ${BACKUP_STORAGE_MODE:-local}
      BACKUP_STREAM_DIR: /tmp/catalyst-backup-stream
      BACKUP_TRANSFER_DIR: /tmp/catalyst-backup-transfer

      # S3 backups (only used when BACKUP_STORAGE_MODE=s3)
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_PATH_STYLE: ${BACKUP_S3_PATH_STYLE:-}

      # App
      APP_NAME: ${APP_NAME:-Catalyst}
      ENABLE_COMPRESSION: ${ENABLE_COMPRESSION:-true}

      # Webhooks (optional)
      WEBHOOK_URLS: ${WEBHOOK_URLS:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}

      # Suspension (optional)
      SUSPENSION_ENFORCED: ${SUSPENSION_ENFORCED:-true}
      SUSPENSION_DELETE_BLOCKED: ${SUSPENSION_DELETE_BLOCKED:-false}
      SUSPENSION_DELETE_POLICY: ${SUSPENSION_DELETE_POLICY:-keep}

      # Plugins
      PLUGINS_DIR: /var/lib/catalyst/plugins

      # OAuth (optional — leave empty to disable)
      WHMCS_OIDC_CLIENT_ID: ${WHMCS_OIDC_CLIENT_ID:-}
      WHMCS_OIDC_CLIENT_SECRET: ${WHMCS_OIDC_CLIENT_SECRET:-}
      WHMCS_OIDC_DISCOVERY_URL: ${WHMCS_OIDC_DISCOVERY_URL:-}
      PAYMENTER_OIDC_CLIENT_ID: ${PAYMENTER_OIDC_CLIENT_ID:-}
      PAYMENTER_OIDC_CLIENT_SECRET: ${PAYMENTER_OIDC_CLIENT_SECRET:-}
      PAYMENTER_OIDC_DISCOVERY_URL: ${PAYMENTER_OIDC_DISCOVERY_URL:-}

      # Misc tuning (unlikely to need changing)
      CONSOLE_OUTPUT_BYTE_LIMIT_BYTES: ${CONSOLE_OUTPUT_BYTE_LIMIT_BYTES:-524288}
      MAX_DISK_MB: ${MAX_DISK_MB:-1048576}
    ports:
      - "${BACKEND_PORT:-127.0.0.1:3000}:3000"
      - "${SFTP_PORT:-0.0.0.0:2022}:2022"
    volumes:
      - catalyst-server-data:/var/lib/catalyst/servers
      - catalyst-backup-data:/var/lib/catalyst/backups
      - catalyst-plugin-data:/var/lib/catalyst/plugins
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # Frontend (Nginx)
  # ===========================================================================
  frontend:
    image: ghcr.io/catalystctl/catalyst-frontend:latest
    container_name: catalyst-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-0.0.0.0:80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  catalyst-postgres-data:
    driver: local
  catalyst-server-data:
    driver: local
  catalyst-backup-data:
    driver: local
  catalyst-plugin-data:
    driver: local
